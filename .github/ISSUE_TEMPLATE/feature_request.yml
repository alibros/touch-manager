name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is difficult today, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the ideal user flow rather than only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Hardware and safety implications
      description: Include target selection, failure modes, and recovery if relevant.
